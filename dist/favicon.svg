<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Shopping bag body -->
  <rect x="14" y="26" width="36" height="26" rx="4" fill="white" stroke="#111827" stroke-width="2.5"/>

  <!-- Bag handle left arc -->
  <path
    d="M22 26 Q22 14 32 14 Q42 14 42 26"
    fill="none"
    stroke="#111827"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Center crease line on bag -->
  <line x1="32" y1="26" x2="32" y2="52" stroke="#16a34a" stroke-width="2" stroke-dasharray="2 3"/>

  <!-- Small star/sparkle accent top-right -->
  <circle cx="47" cy="13" r="4" fill="#fbbf24"/>
  <line x1="47" y1="9" x2="47" y2="10.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="15.5" x2="47" y2="17" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="13" x2="44.5" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="49.5" y1="13" x2="51" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
